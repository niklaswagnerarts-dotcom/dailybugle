<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Zeitung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F7F5F0;
    --bg2:       #EEEAE2;
    --surface:   #FFFFFF;
    --border:    rgba(0,0,0,0.10);
    --border-md: rgba(0,0,0,0.18);
    --text:      #1A1814;
    --text2:     #5C574F;
    --text3:     #9C9488;
    --rule:      #1A1814;

    --cat-tech-bg:   #DDEAF8; --cat-tech-tx:   #0A3D6B;
    --cat-pol-bg:    #FAE8E0; --cat-pol-tx:    #6B2410;
    --cat-wirt-bg:   #DFF0E0; --cat-wirt-tx:   #1A4D1E;
    --cat-wiss-bg:   #EAE6F8; --cat-wiss-tx:   #35256B;
    --cat-ent-bg:    #FAF0D8; --cat-ent-tx:    #5C3A08;

    --serif: 'Playfair Display', Georgia, serif;
    --sans:  'Source Sans 3', system-ui, sans-serif;

    --radius: 4px;
    --radius-lg: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #161410;
      --bg2:       #1E1C18;
      --surface:   #232018;
      --border:    rgba(255,255,255,0.09);
      --border-md: rgba(255,255,255,0.16);
      --text:      #F0EDE6;
      --text2:     #A09B90;
      --text3:     #6A6560;
      --rule:      #F0EDE6;

      --cat-tech-bg:   #0D2540; --cat-tech-tx:   #93C4F0;
      --cat-pol-bg:    #3D1508; --cat-pol-tx:    #F0A882;
      --cat-wirt-bg:   #0D2E10; --cat-wirt-tx:   #82CC88;
      --cat-wiss-bg:   #1E1640; --cat-wiss-tx:   #B8AAEE;
      --cat-ent-bg:    #2E1E04; --cat-ent-tx:    #E8C070;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 400;
    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }
  a:hover { opacity: 0.75; }
  img { display: block; width: 100%; height: 100%; object-fit: cover; }

  /* ── PAGE WRAPPER ── */
  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ── MASTHEAD ── */
  .masthead {
    padding: 28px 0 12px;
    text-align: center;
    border-bottom: 2px solid var(--rule);
  }
  .masthead-title {
    font-family: var(--serif);
    font-size: clamp(38px, 7vw, 72px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }
  .masthead-subtitle {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 6px;
    font-weight: 300;
  }

  /* ── META BAR ── */
  .meta-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 0.5px solid var(--border-md);
    font-size: 12px;
    color: var(--text2);
    flex-wrap: wrap;
    gap: 4px;
  }
  .meta-left { display: flex; align-items: center; gap: 16px; }
  .meta-weather { display: flex; align-items: center; gap: 5px; }
  .meta-weather svg { opacity: 0.6; flex-shrink: 0; }

  /* ── HERO ── */
  .hero {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 28px;
    padding: 28px 0 24px;
    border-bottom: 0.5px solid var(--border-md);
  }
  .hero-text { display: flex; flex-direction: column; justify-content: center; }
  .hero-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 12px;
  }
  .hero-summary {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text2);
    margin-bottom: 14px;
  }
  .hero-meta {
    font-size: 11px;
    color: var(--text3);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .hero-meta span::before { content: '·'; margin-right: 12px; opacity: 0.4; }
  .hero-meta span:first-child::before { content: ''; margin-right: 0; }
  .hero-img {
    border-radius: var(--radius-lg);
    overflow: hidden;
    aspect-ratio: 4 / 3;
    background: var(--bg2);
    border: 0.5px solid var(--border);
  }

  /* ── SECTION ── */
  .section { margin-top: 32px; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 7px;
    border-bottom: 0.5px solid var(--border-md);
  }
  .section-title {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }
  .section-count {
    font-size: 11px;
    color: var(--text3);
  }

  /* ── CARDS GRID ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .card:hover { border-color: var(--border-md); }

  .card-img {
    aspect-ratio: 16 / 9;
    background: var(--bg2);
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-body {
    padding: 12px 14px 13px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    margin-bottom: 8px;
    width: fit-content;
  }
  .badge-tech   { background: var(--cat-tech-bg);  color: var(--cat-tech-tx); }
  .badge-politik { background: var(--cat-pol-bg);   color: var(--cat-pol-tx); }
  .badge-wirtschaft { background: var(--cat-wirt-bg); color: var(--cat-wirt-tx); }
  .badge-wissenschaft { background: var(--cat-wiss-bg); color: var(--cat-wiss-tx); }
  .badge-entertainment { background: var(--cat-ent-bg); color: var(--cat-ent-tx); }
  .badge-film   { background: var(--cat-ent-bg); color: var(--cat-ent-tx); }
  .badge-gaming { background: var(--cat-ent-bg); color: var(--cat-ent-tx); }
  .badge-medien { background: var(--cat-ent-bg); color: var(--cat-ent-tx); }

  .card-title {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 6px;
    flex: 1;
  }
  .card-summary {
    font-size: 12px;
    line-height: 1.55;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    border-top: 0.5px solid var(--border);
    padding-top: 8px;
    margin-top: auto;
  }

  /* ── FOOTER ── */
  .site-footer {
    margin-top: 48px;
    padding-top: 14px;
    border-top: 0.5px solid var(--border-md);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text3);
    flex-wrap: wrap;
    gap: 6px;
  }
  .site-footer-brand {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 720px) {
    .hero { grid-template-columns: 1fr; }
    .hero-img { order: -1; aspect-ratio: 16/9; }
    .cards { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .page { padding: 0 16px 48px; }
    .cards { grid-template-columns: 1fr; }
    .meta-bar { font-size: 11px; }
  }

  /* ── LOAD ANIMATION ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero        { animation: fadeUp 0.4s ease both; }
  .section     { animation: fadeUp 0.4s ease both; }
  .section:nth-child(2) { animation-delay: 0.05s; }
  .section:nth-child(3) { animation-delay: 0.10s; }
  .section:nth-child(4) { animation-delay: 0.15s; }
  .section:nth-child(5) { animation-delay: 0.20s; }
  .section:nth-child(6) { animation-delay: 0.25s; }
</style>
</head>
<body>

<div class="page">

  <!-- MASTHEAD -->

    <div class="masthead-title" id="js-title">Meine Zeitung</div>
    <div class="masthead-subtitle">Deine persönliche tägliche Nachrichtenausgabe</div>
  </header>

  <!-- META BAR -->

      <span id="js-datum"></span>
      <span id="js-ausgabe"></span>
    </div>
    <div class="meta-weather">

        <circle cx="8" cy="8" r="3" fill="currentColor"/>

      </svg>
      <span id="js-wetter"></span>
    </div>
  </div>

  <!-- HERO -->
  <article class="hero" id="js-hero"></article>

  <!-- SEKTIONEN -->
  <main id="js-sektionen"></main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span class="site-footer-brand">Meine Zeitung</span>
    <span id="js-footer"></span>
  </footer>

</div>

<script>
(function() {
  const D = window.ZEITUNG_DATA;
  const m = D.meta;

  // Meta bar
  document.getElementById('js-datum').textContent = m.datum;
  document.getElementById('js-ausgabe').textContent = 'Ausgabe #' + m.ausgabe;
  document.getElementById('js-wetter').textContent = m.wetter;

  // Footer
  document.getElementById('js-footer').textContent =
    m.artikelCount + ' Artikel analysiert · Letzte Aktualisierung: ' + m.updatezeit + ' Uhr';

  // Hero
  const h = D.hero;
  document.getElementById('js-hero').innerHTML = `
    <div class="hero-text">
      <div class="hero-eyebrow">Aufmacher des Tages</div>
      <a href="${h.articleUrl}">
        <h1 class="hero-title">${h.title}</h1>
      </a>
      <p class="hero-summary">${h.summary}</p>
      <div class="hero-meta">
        <span>${h.source}</span>
        <span>${h.readtime} Lesezeit</span>
      </div>
    </div>
    <a href="${h.articleUrl}" class="hero-img">
      <img src="${h.imageUrl}" alt="${h.title}" loading="lazy">
    </a>
  `;

  // Sektionen
  const container = document.getElementById('js-sektionen');
  D.sektionen.forEach(sek => {
    const kartenHTML = sek.artikel.map(a => `
      <a href="${a.articleUrl}" class="card">
        <div class="card-img">
          <img src="${a.imageUrl}" alt="${a.title}" loading="lazy">
        </div>
        <div class="card-body">
          <span class="badge badge-${a.category}">${a.category}</span>
          <p class="card-title">${a.title}</p>
          <p class="card-summary">${a.summary}</p>
          <div class="card-footer">
            <span>${a.source}</span>
            <span>${a.readtime}</span>
          </div>
        </div>
      </a>
    `).join('');

    const section = document.createElement('section');
    section.className = 'section';
    section.innerHTML = `
      <div class="section-header">
        <span class="section-title">${sek.titel}</span>
        <span class="section-count">${sek.artikel.length} Artikel</span>
      </div>
      <div class="cards">${kartenHTML}</div>
    `;
    container.appendChild(section);
  });
})();
</script>
