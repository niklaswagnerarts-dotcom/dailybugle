.nav {

  -webkit-backdrop-filter: blur(0px);
  background: transparent;

}
.nav.scrolled {
  backdrop-filter: blur(24px) saturate(1.4);

  border-bottom-color: rgba(255,255,255,0.9);
}

  font-size: 12px;

  padding: 4px 12px 4px 6px;

  0%   { transform: translateY(0); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translateY(12px); opacity: 0; }
}

<!-- TWEAKS -->
<div id="tweaks-panel">
  <div class="tweaks-title">Tweaks</div>

  <div class="tweak-row">
    <div class="tweak-lbl">Hintergrund <span id="tw-bg-val">Violett</span></div>
    <select id="tw-bg">
      <option value="purple">Violett-Blau</option>
      <option value="green">Grün-Türkis</option>
      <option value="warm">Warm-Sand</option>
      <option value="mono">Monochrom</option>
    </select>
  </div>

  <div class="tweak-row">
    <div class="tweak-lbl">Glasstärke <span id="tw-blur-val">18px</span></div>
    <input type="range" id="tw-blur" min="0" max="40" step="2" value="18">
  </div>

  <div class="tweak-row">
    <div class="tweak-lbl">Zusammenfassungen</div>
    <div class="tweak-toggle">
      <span id="tw-sum-lbl" style="font-size:12px;color:var(--text3)">Sichtbar</span>
      <div class="toggle-sw on" id="tw-sum"></div>
    </div>
  </div>

  <div class="tweak-row">
    <div class="tweak-lbl">Bilder</div>
    <div class="tweak-toggle">
      <span id="tw-img-lbl" style="font-size:12px;color:var(--text3)">Sichtbar</span>
      <div class="toggle-sw on" id="tw-img"></div>
    </div>
  </div>
</div>

<script>
/* ── Scroll nav ── */
const nav = document.querySelector('.nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

/* ── Tweaks ── */
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').classList.add('visible');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

const bgPresets = {
  purple: ['#f0f4ff','#faf0ff','#fff4f0', 'oklch(88% 0.08 260 / 0.7)','oklch(88% 0.08 300 / 0.6)','oklch(90% 0.06 30 / 0.5)'],
  green:  ['#f0fff4','#f0fafa','#fffff0', 'oklch(88% 0.08 160 / 0.7)','oklch(88% 0.08 200 / 0.6)','oklch(90% 0.06 90 / 0.5)'],
  warm:   ['#fff8f0','#fff0f4','#fffff0', 'oklch(92% 0.07 60 / 0.7)', 'oklch(90% 0.07 30 / 0.6)', 'oklch(92% 0.05 80 / 0.5)'],
  mono:   ['#f5f5f7','#f0f0f5','#ebebf0', 'oklch(90% 0.01 260 / 0.6)','oklch(88% 0.01 260 / 0.5)','oklch(86% 0.01 260 / 0.4)'],
};
const bgLabels = { purple:'Violett-Blau', green:'Grün-Türkis', warm:'Warm-Sand', mono:'Monochrom' };

document.getElementById('tw-bg').addEventListener('change', function() {
  const p = bgPresets[this.value];
  document.documentElement.style.setProperty('--bg-from', p[0]);
  document.documentElement.style.setProperty('--bg-mid',  p[1]);
  document.documentElement.style.setProperty('--bg-to',   p[2]);
  document.body.style.background = `
    radial-gradient(ellipse 80% 60% at 20% 10%, ${p[3]}, transparent),
    radial-gradient(ellipse 60% 50% at 80% 20%, ${p[4]}, transparent),
    radial-gradient(ellipse 70% 60% at 60% 90%, ${p[5]}, transparent),
    ${p[0]}`;
  document.body.style.backgroundAttachment = 'fixed';
  document.getElementById('tw-bg-val').textContent = bgLabels[this.value];
});

document.getElementById('tw-blur').addEventListener('input', function() {
  document.documentElement.style.setProperty('--glass-blur', this.value + 'px');
  document.getElementById('tw-blur-val').textContent = this.value + 'px';
});

let sumOn = true;
document.getElementById('tw-sum').addEventListener('click', function() {
  sumOn = !sumOn;
  this.classList.toggle('on', sumOn);
  document.getElementById('tw-sum-lbl').textContent = sumOn ? 'Sichtbar' : 'Aus';
  document.querySelectorAll('.card-summary, .hero-summary').forEach(el => el.style.display = sumOn ? '' : 'none');
});

let imgOn = true;
document.getElementById('tw-img').addEventListener('click', function() {
  imgOn = !imgOn;
  this.classList.toggle('on', imgOn);
  document.getElementById('tw-img-lbl').textContent = imgOn ? 'Sichtbar' : 'Aus';
  document.querySelectorAll('.card-img, .hero-img').forEach(el => el.style.display = imgOn ? '' : 'none');
});

/* ── Render ── */
(function() {
  const D = window.ZEITUNG_DATA;
  const m = D.meta;

  document.getElementById('js-datum-nav').textContent = m.datum;

  // Weather widget
  (function() {
    const raw = m.wetter; // e.g. "Strasbourg · 14 °C, leicht bewölkt"
    const parts = raw.split('·');
    const city = parts[0].trim();
    const rest = parts[1] ? parts[1].trim() : '';
    const tempMatch = rest.match(/([\d\-]+)\s*°C/);
    const temp = tempMatch ? tempMatch[1] + ' °C' : '';
    const condRaw = rest.replace(/[\d\-]+\s*°C,?\s*/, '').trim();

    const w = condRaw.toLowerCase();
    let icon = '';

    if (w.includes('regen') || w.includes('schauer')) {
      // Animated rain
      icon = `<svg viewBox="0 0 30 30" fill="none">
        <circle cx="11" cy="11" r="6" fill="#90b8e0" style="animation:cloud-bob 3s ease-in-out infinite"/>
        <ellipse cx="17" cy="13" rx="8" ry="6" fill="#b8d4f0" style="animation:cloud-bob 3s ease-in-out infinite"/>
        <line x1="9"  y1="21" x2="7"  y2="27" stroke="#5090c8" stroke-width="1.5" stroke-linecap="round" style="animation:rain-drop 1.1s ease-in infinite 0.0s"/>
        <line x1="15" y1="21" x2="13" y2="27" stroke="#5090c8" stroke-width="1.5" stroke-linecap="round" style="animation:rain-drop 1.1s ease-in infinite 0.3s"/>
        <line x1="21" y1="21" x2="19" y2="27" stroke="#5090c8" stroke-width="1.5" stroke-linecap="round" style="animation:rain-drop 1.1s ease-in infinite 0.6s"/>
      </svg>`;
    } else if (w.includes('bewölkt') || w.includes('wolkig') || w.includes('bedeckt')) {
      if (w.includes('leicht') || w.includes('teils')) {
        // Partly cloudy — sun + cloud
        icon = `<svg viewBox="0 0 30 30" fill="none">
          <g style="animation:sun-spin 8s linear infinite;transform-origin:9px 9px">
            <circle cx="9" cy="9" r="4" fill="#f5c842" style="animation:sun-glow 2s ease-in-out infinite"/>
            <line x1="9" y1="2" x2="9" y2="4"   stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9" y1="14" x2="9" y2="16"  stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="9" x2="4" y2="9"    stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="14" y1="9" x2="16" y2="9"  stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="3.9" y1="3.9" x2="5.3" y2="5.3" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12.7" y1="12.7" x2="14.1" y2="14.1" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="14.1" y1="3.9" x2="12.7" y2="5.3" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="5.3" y1="12.7" x2="3.9" y2="14.1" stroke="#f5c842" stroke-width="1.5" stroke-linecap="round"/>
          </g>
          <circle cx="14" cy="18" r="5" fill="#c8d8ee" style="animation:cloud-bob 3s ease-in-out infinite"/>
          <ellipse cx="20" cy="19.5" rx="7" ry="5" fill="#ddeaf8" style="animation:cloud-bob 3s ease-in-out infinite"/>
        </svg>`;
      } else {
        // Overcast — full cloud
        icon = `<svg viewBox="0 0 30 30" fill="none">
          <circle cx="10" cy="13" r="6" fill="#b0c4d8" style="animation:cloud-bob 4s ease-in-out infinite"/>
          <circle cx="18" cy="15" r="6" fill="#c8d8ec" style="animation:cloud-bob 4s ease-in-out infinite 0.5s"/>
          <ellipse cx="14" cy="18" rx="10" ry="6" fill="#d8e8f4" style="animation:cloud-bob 4s ease-in-out infinite 0.2s"/>
        </svg>`;
      }
    } else if (w.includes('schnee') || w.includes('schneefall')) {
      icon = `<svg viewBox="0 0 30 30" fill="none">
        <ellipse cx="15" cy="13" rx="10" ry="6" fill="#d8eaf8"/>
        <circle cx="10" cy="10" r="4" fill="#c8ddf0"/>
        <text x="8"  y="26" font-size="7" fill="#90c0e8" style="animation:rain-drop 1.5s ease-in infinite 0.0s">❄</text>
        <text x="16" y="26" font-size="7" fill="#90c0e8" style="animation:rain-drop 1.5s ease-in infinite 0.5s">❄</text>
      </svg>`;
    } else {
      // Clear/sunny (default)
      icon = `<svg viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="15" r="6" fill="#f5c842" style="animation:sun-glow 2s ease-in-out infinite"/>
        <g style="animation:sun-spin 10s linear infinite;transform-origin:15px 15px">
          <line x1="15" y1="3"  x2="15" y2="7"  stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
          <line x1="15" y1="23" x2="15" y2="27" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
          <line x1="3"  y1="15" x2="7"  y2="15" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
          <line x1="23" y1="15" x2="27" y2="15" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
          <line x1="6.2" y1="6.2" x2="9"  y2="9"   stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
          <line x1="21" y1="21"  x2="23.8" y2="23.8" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
          <line x1="23.8" y1="6.2" x2="21" y2="9"  stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="21"   x2="6.2" y2="23.8" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
        </g>
      </svg>`;
    }

    const el = document.getElementById('js-wetter-nav');
    el.className = 'weather-pill';
    el.innerHTML = `
      <div class="weather-icon">${icon}</div>
      <div class="weather-info">
        <span class="weather-temp">${temp}</span>
        <span class="weather-cond">${condRaw || city}</span>
      </div>
    `;
  })();
  document.getElementById('js-footer').textContent =
    m.artikelCount + ' Artikel analysiert · Zuletzt ' + m.updatezeit + ' Uhr';

  const h = D.hero;
  document.getElementById('js-hero').innerHTML = `
    <div class="hero-text">
      <div class="hero-kicker">Aufmacher des Tages</div>
      <a href="${h.articleUrl}"><h1 class="hero-title">${h.title}</h1></a>
      <p class="hero-summary">${h.summary}</p>
      <div class="hero-foot">
        <span class="hero-source">${h.source}</span>
        <span class="hero-dot">·</span>
        <span class="hero-time">${h.readtime} Lesezeit</span>
      </div>
      <a href="${h.articleUrl}" class="read-btn">Artikel lesen →</a>
    </div>
    <a href="${h.articleUrl}" class="hero-img">
      <img src="${h.imageUrl}" alt="${h.title}" loading="lazy">
    </a>
  `;

  const container = document.getElementById('js-sections');
  const sectionIcons = {
    tech: `<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="14" height="14" rx="2"/><line x1="7" y1="7" x2="7" y2="7" stroke-width="2.5"/><line x1="10" y1="7" x2="10" y2="7" stroke-width="2.5"/><line x1="13" y1="7" x2="13" y2="7" stroke-width="2.5"/><line x1="7" y1="10" x2="7" y2="10" stroke-width="2.5"/><line x1="10" y1="10" x2="13" y2="10"/><line x1="7" y1="13" x2="13" y2="13"/></svg>`,
    politik: `<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 17h16"/><path d="M4 17V9"/><path d="M8 17V9"/><path d="M12 17V9"/><path d="M16 17V9"/><path d="M1 9l9-6 9 6"/></svg>`,
    wirtschaft: `<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,14 7,9 11,12 18,5"/><polyline points="14,5 18,5 18,9"/></svg>`,
    wissenschaft: `<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="3"/><ellipse cx="10" cy="10" rx="9" ry="4"/><ellipse cx="10" cy="10" rx="9" ry="4" transform="rotate(60 10 10)"/><ellipse cx="10" cy="10" rx="9" ry="4" transform="rotate(120 10 10)"/></svg>`,
    entertainment: `<svg viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,10 5,17"/></svg>`
  };
  const iconClass = { tech:'icon-tech', politik:'icon-politik', wirtschaft:'icon-wirtschaft', wissenschaft:'icon-wissenschaft', entertainment:'icon-entertainment', film:'icon-entertainment', gaming:'icon-entertainment', medien:'icon-entertainment' };

  D.sektionen.forEach(sek => {
    const cards = sek.artikel.map(a => `
      <a href="${a.articleUrl}" class="card">
        <div class="card-img">
          <img src="${a.imageUrl}" alt="${a.title}" loading="lazy">
        </div>
        <div class="card-body">
          <span class="badge badge-${a.category}">${a.category}</span>
          <p class="card-title">${a.title}</p>
          <p class="card-summary">${a.summary}</p>
          <div class="card-foot">
            <span>${a.source}</span>
            <span>${a.readtime}</span>
          </div>
        </div>
      </a>
    `).join('');

    const sec = document.createElement('section');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-head">
        <div class="section-label">
          <div class="section-icon ${iconClass[sek.id] || 'icon-tech'}">${sectionIcons[sek.id] || sectionIcons.tech}</div>
          <span class="section-name">${sek.titel}</span>
        </div>
        <a href="#" class="section-all">${sek.artikel.length} Artikel ›</a>
      </div>
      <div class="cards">${cards}</div>
    `;
    container.appendChild(sec);
  });
})();
</script>
</body>
</html>
