<style>
:root {
  --f: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --bg-from:  #f0f4ff;
  --bg-mid:   #faf0ff;
  --bg-to:    #fff4f0;
  --glass-bg: rgba(255,255,255,0.94);
  --glass-border: rgba(255,255,255,0.95);
  --glass-blur: 18px;
  --text:    #06060c;
  --text2:   #1a1a28;
  --text3:   #444458;
  --surface: rgba(255,255,255,0.55);
  --c-tech:   oklch(48% 0.18 250);
  --c-pol:    oklch(52% 0.18 22);
  --c-wirt:   oklch(48% 0.16 155);
  --c-wiss:   oklch(50% 0.18 290);
  --c-ent:    oklch(55% 0.16 55);
  --r: 16px;
  --r-lg: 22px;
  --shadow: 0 2px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-hover: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg-from:  #0d0e1a; --bg-mid: #130d1a; --bg-to: #1a0d0e;
    --glass-bg: rgba(18,18,28,0.88);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0f0fa; --text2: #c8c8d8; --text3: #8888a0;
    --surface: rgba(20,20,30,0.55);
    --shadow: 0 2px 24px rgba(0,0,0,0.35), 0 1px 4px rgba(0,0,0,0.2);
    --shadow-hover: 0 8px 40px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.3);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  font-family: var(--f);
  color: var(--text);
  min-height: 100vh;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, oklch(88% 0.08 260 / 0.7), transparent),
    radial-gradient(ellipse 60% 50% at 80% 20%, oklch(88% 0.08 300 / 0.6), transparent),
    radial-gradient(ellipse 70% 60% at 60% 90%, oklch(90% 0.06 30 / 0.5), transparent),
    var(--bg-from);
  background-attachment: fixed;
}

a { color: inherit; text-decoration: none; }
img { display: block; width: 100%; height: 100%; object-fit: cover; }

.page { max-width: 1120px; margin: 0 auto; padding: 0 24px 80px; }

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
  background: transparent; border-bottom: 1px solid transparent;
  margin: 0 -24px; padding: 0 24px;
  transition: background 0.3s, border-color 0.3s, backdrop-filter 0.3s;
}
.nav.scrolled {
  backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4);
  background: rgba(255,255,255,0.72); border-bottom-color: rgba(255,255,255,0.9);
}
@media (prefers-color-scheme: dark) {
  .nav.scrolled { background: rgba(12,12,20,0.75); border-bottom-color: rgba(255,255,255,0.08); }
}
.nav-inner {
  max-width: 1120px; margin: 0 auto; height: 70px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.nav-meta { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text2); }
.pill {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 100px; padding: 3px 10px; font-size: 11px; font-weight: 500;
  color: var(--text2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.weather-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  border-radius: 100px; padding: 4px 12px 4px 6px;
  font-size: 11px; font-weight: 500; color: var(--text2);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.weather-icon { width: 30px; height: 30px; flex-shrink: 0; }
.weather-icon svg { width: 100%; height: 100%; overflow: visible; }
.weather-info { display: flex; flex-direction: column; line-height: 1.25; }
.weather-temp { font-size: 13px; font-weight: 700; letter-spacing: -0.03em; color: var(--text); }
.weather-cond { font-size: 10px; color: var(--text3); }

@keyframes sun-spin  { to { transform: rotate(360deg); transform-origin: 15px 15px; } }
@keyframes sun-glow  { 0%,100%{opacity:.7} 50%{opacity:1} }
@keyframes cloud-bob { 0%,100%{transform:translateX(0)} 50%{transform:translateX(2px)} }
@keyframes rain-drop { 0%{transform:translateY(0);opacity:0} 20%{opacity:1} 100%{transform:translateY(12px);opacity:0} }

/* HERO */
.hero-wrap { padding: 32px 0 0; }
.hero {
  display: grid; grid-template-columns: 1fr 420px; gap: 2px;
  border-radius: var(--r-lg); overflow: hidden;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(1.4);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.4);
  border: 1px solid var(--glass-border); box-shadow: var(--shadow);
  animation: fadeUp 0.45s ease both;
}
.hero-text {
  padding: 36px 36px 32px; display: flex; flex-direction: column;
  gap: 16px; justify-content: center;
  background: rgba(255,255,255,0.97); color: #06060c;
}
.hero-text * { color: inherit; }
@media (prefers-color-scheme: dark) {
  .hero-text { background: rgba(16,16,26,0.97); }
  .hero-text .hero-title  { color: #f0f0fa; }
  .hero-text .hero-summary { color: #c0c0d0; }
  .hero-text .hero-source  { color: #d0d0e0; }
  .hero-text .hero-time    { color: #8888a0; }
  .hero-text .hero-kicker  { color: #8888a0; }
  .hero-text .hero-kicker::before { background: #8888a0; }
}
.hero-kicker {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #444458;
}
.hero-kicker::before { content:''; width:14px; height:1.5px; background:#444458; display:block; flex-shrink:0; }
.hero-title { font-size: clamp(20px, 2.4vw, 30px); font-weight: 700; line-height: 1.2; letter-spacing: -0.03em; color: #06060c; text-wrap: pretty; }
.hero-summary { font-size: 14px; line-height: 1.7; color: #2a2a3a; font-weight: 300; }
.hero-foot { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
.hero-source { font-size: 12px; font-weight: 600; color: #1a1a28; }
.hero-dot { color: #444458; font-size: 10px; }
.hero-time { font-size: 12px; color: #444458; }
.read-btn {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 4px;
  background: var(--text); color: var(--bg-from);
  font-size: 13px; font-weight: 600; padding: 9px 18px;
  border-radius: 100px; width: fit-content;
  transition: opacity 0.15s, transform 0.15s;
}
.read-btn:hover { opacity: 0.85; transform: translateY(-1px); }
@media (prefers-color-scheme: dark) { .read-btn { color: #0a0a0f; } }
.hero-img { position: relative; overflow: hidden; min-height: 320px; }
.hero-img img { position: absolute; inset: 0; transition: transform 0.6s ease; }
.hero:hover .hero-img img { transform: scale(1.04); }

/* SECTIONS */
.sections { margin-top: 40px; }
.section { margin-top: 40px; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards; }
.section:nth-child(1) { animation-delay: 0.05s; }
.section:nth-child(2) { animation-delay: 0.10s; }
.section:nth-child(3) { animation-delay: 0.15s; }
.section:nth-child(4) { animation-delay: 0.20s; }
.section:nth-child(5) { animation-delay: 0.25s; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-label { display: flex; align-items: center; gap: 10px; }
.section-icon { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.section-icon svg { width: 18px; height: 18px; stroke: white; }
.section-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); text-shadow: 0 1px 3px rgba(255,255,255,0.6); }
@media (prefers-color-scheme: dark) { .section-name { text-shadow: none; } }
.section-count { font-size: 12px; font-weight: 500; color: var(--text3); }

/* SLIDER */
.slider-wrap { position: relative; }
.cards-slider {
  display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch; padding-bottom: 12px;
  scrollbar-width: none;
}
.cards-slider::-webkit-scrollbar { display: none; }
.slider-btn {
  position: absolute; top: 50%; transform: translateY(-60%);
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  box-shadow: var(--shadow); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  z-index: 10; transition: opacity 0.2s, transform 0.2s;
  color: var(--text); font-size: 16px;
}
.slider-btn:hover { transform: translateY(-60%) scale(1.08); box-shadow: var(--shadow-hover); }
.slider-btn.prev { left: -20px; }
.slider-btn.next { right: -20px; }
.slider-btn:disabled { opacity: 0.3; pointer-events: none; }

/* CARD */
.card {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(1.3);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.3);
  border: 1px solid var(--glass-border); border-radius: var(--r);
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: var(--shadow); transition: box-shadow 0.25s ease, transform 0.25s ease;
  cursor: pointer;
  flex: 0 0 300px; scroll-snap-align: start;
  min-width: 0;
}
.card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
.card-img { aspect-ratio: 16/9; overflow: hidden; flex-shrink: 0; background: rgba(120,120,140,0.1); }
.card-img img { transition: transform 0.5s ease; }
.card:hover .card-img img { transform: scale(1.06); }
.card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; flex: 1; gap: 8px; }
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; width: fit-content;
}
.badge::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
.badge-tech { color: oklch(38% 0.20 250); }
.badge-politik { color: oklch(40% 0.20 22); }
.badge-wirtschaft { color: oklch(38% 0.18 155); }
.badge-wissenschaft { color: oklch(40% 0.20 290); }
.badge-entertainment, .badge-film, .badge-gaming, .badge-medien { color: oklch(42% 0.18 55); }
@media (prefers-color-scheme: dark) {
  .badge-tech { color: oklch(72% 0.16 250); }
  .badge-politik { color: oklch(74% 0.16 22); }
  .badge-wirtschaft { color: oklch(72% 0.14 155); }
  .badge-wissenschaft { color: oklch(74% 0.16 290); }
  .badge-entertainment, .badge-film, .badge-gaming, .badge-medien { color: oklch(76% 0.14 55); }
}
.card-title { font-size: 14px; font-weight: 600; line-height: 1.35; letter-spacing: -0.02em; color: var(--text); flex: 1; text-wrap: pretty; }
.card-summary { font-size: 12px; line-height: 1.6; color: var(--text2); font-weight: 300; }
.card-foot {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--text2); font-weight: 500;
  margin-top: 2px; padding-top: 10px; border-top: 1px solid rgba(128,128,160,0.1);
}

/* FOOTER */
.site-footer {
  margin-top: 60px; display: flex; justify-content: space-between;
  align-items: center; font-size: 12px; color: var(--text2);
  flex-wrap: wrap; gap: 8px; padding-top: 20px;
  border-top: 1px solid rgba(128,128,160,0.15);
}

@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

@media (max-width: 860px) {
  .hero { grid-template-columns: 1fr; }
  .hero-img { min-height: 240px; aspect-ratio: 16/9; position: relative; }
  .hero-img img { position: static; width: 100%; height: 100%; }
  .card { flex: 0 0 260px; }
}
@media (max-width: 540px) {
  .page { padding: 0 14px 60px; }
  .nav { margin: 0 -14px; padding: 0 14px; }
  .hero-text { padding: 24px 20px 20px; }
  .card { flex: 0 0 220px; }
  .slider-btn { display: none; }
}
</style>

<script>
const nav = document.querySelector('.nav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 10), {passive:true});

(function() {
  const D = window.ZEITUNG_DATA;
  const m = D.meta;

  document.getElementById('js-datum-nav').textContent = m.datum;
  document.getElementById('js-footer').textContent = m.artikelCount + ' Artikel analysiert · Zuletzt ' + m.updatezeit + ' Uhr';

  // Weather
  (function() {
    const raw = m.wetter;
    const parts = raw.split('·');
    const rest = parts[1] ? parts[1].trim() : '';
    const tempMatch = rest.match(/([\d\-]+)\s*°C/);
    const temp = tempMatch ? tempMatch[1] + ' °C' : '';
    const condRaw = rest.replace(/[\d\-]+\s*°C,?\s*/, '').trim();
    const w = condRaw.toLowerCase();
    let icon = '';
    if (w.includes('regen') || w.includes('schauer')) {
      icon = `<svg viewBox="0 0 30 30" fill="none"><circle cx="11" cy="11" r="6" fill="#90b8e0" style="animation:cloud-bob 3s ease-in-out infinite"/><ellipse cx="17" cy="13" rx="8" ry="6" fill="#b8d4f0" style="animation:cloud-bob 3s ease-in-out infinite"/><line x1="9" y1="21" x2="7" y2="27" stroke="#5090c8" stroke-width="1.5" stroke-linecap="round" style="animation:rain-drop 1.1s ease-in infinite"/><line x1="15" y1="21" x2="13" y2="27" stroke="#5090c8" stroke-width="1.5" stroke-linecap="round" style="animation:rain-drop 1.1s ease-in infinite 0.3s"/><line x1="21" y1="21" x2="19" y2="27" stroke="#5090c8" stroke-width="1.5" stroke-linecap="round" style="animation:rain-drop 1.1s ease-in infinite 0.6s"/></svg>`;
    } else if (w.includes('bewölkt') || w.includes('wolkig') || w.includes('bedeckt') || w.includes('cloudy')) {
      icon = `<svg viewBox="0 0 30 30" fill="none"><circle cx="10" cy="13" r="6" fill="#b0c4d8" style="animation:cloud-bob 4s ease-in-out infinite"/><circle cx="18" cy="15" r="6" fill="#c8d8ec" style="animation:cloud-bob 4s ease-in-out infinite 0.5s"/><ellipse cx="14" cy="18" rx="10" ry="6" fill="#d8e8f4" style="animation:cloud-bob 4s ease-in-out infinite 0.2s"/></svg>`;
    } else {
      icon = `<svg viewBox="0 0 30 30" fill="none"><circle cx="15" cy="15" r="6" fill="#f5c842" style="animation:sun-glow 2s ease-in-out infinite"/><g style="animation:sun-spin 10s linear infinite;transform-origin:15px 15px"><line x1="15" y1="3" x2="15" y2="7" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/><line x1="15" y1="23" x2="15" y2="27" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="15" x2="7" y2="15" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/><line x1="23" y1="15" x2="27" y2="15" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/><line x1="6.2" y1="6.2" x2="9" y2="9" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/><line x1="21" y1="21" x2="23.8" y2="23.8" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/><line x1="23.8" y1="6.2" x2="21" y2="9" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/><line x1="9" y1="21" x2="6.2" y2="23.8" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/></g></svg>`;
    }
    const el = document.getElementById('js-wetter-nav');
    el.className = 'weather-pill';
    el.innerHTML = `<div class="weather-icon">${icon}</div><div class="weather-info"><span class="weather-temp">${temp}</span><span class="weather-cond">${condRaw}</span></div>`;
  })();

  // Hero
  const h = D.hero;
  document.getElementById('js-hero').innerHTML = `
    <div class="hero-text">
      <div class="hero-kicker">Aufmacher des Tages</div>
      <a href="${h.articleUrl}"><h1 class="hero-title">${h.title}</h1></a>
      <p class="hero-summary">${h.summary}</p>
      <div class="hero-foot">
        <span class="hero-source">${h.source}</span>
        <span class="hero-dot">·</span>
        <span class="hero-time">${h.readtime} Lesezeit</span>
      </div>
      <a href="${h.articleUrl}" class="read-btn">Artikel lesen →</a>
    </div>
    <a href="${h.articleUrl}" class="hero-img">
      <img src="${h.imageUrl}" alt="${h.title}" loading="lazy">
    </a>
  `;

  // Sections
  const container = document.getElementById('js-sections');
  const sectionIcons = {
    tech: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="14" height="14" rx="2"/><line x1="7" y1="7" x2="7" y2="7" stroke-width="2.5"/><line x1="10" y1="7" x2="10" y2="7" stroke-width="2.5"/><line x1="13" y1="7" x2="13" y2="7" stroke-width="2.5"/><line x1="7" y1="10" x2="7" y2="10" stroke-width="2.5"/><line x1="10" y1="10" x2="13" y2="10"/><line x1="7" y1="13" x2="13" y2="13"/></svg>`,
    politik: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 17h16"/><path d="M4 17V9"/><path d="M8 17V9"/><path d="M12 17V9"/><path d="M16 17V9"/><path d="M1 9l9-6 9 6"/></svg>`,
    wirtschaft: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,14 7,9 11,12 18,5"/><polyline points="14,5 18,5 18,9"/></svg>`,
    wissenschaft: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="3"/><ellipse cx="10" cy="10" rx="9" ry="4"/><ellipse cx="10" cy="10" rx="9" ry="4" transform="rotate(60 10 10)"/><ellipse cx="10" cy="10" rx="9" ry="4" transform="rotate(120 10 10)"/></svg>`,
    entertainment: `<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,10 5,17"/></svg>`
  };

  D.sektionen.forEach(sek => {
    const cards = sek.artikel.map(a => `
      <a href="${a.articleUrl}" class="card">
        <div class="card-img"><img src="${a.imageUrl}" alt="${a.title}" loading="lazy"></div>
        <div class="card-body">
          <span class="badge badge-${a.category}">${a.category}</span>
          <p class="card-title">${a.title}</p>
          <p class="card-summary">${a.summary}</p>
          <div class="card-foot"><span>${a.source}</span><span>${a.readtime}</span></div>
        </div>
      </a>
    `).join('');

    const sliderId = 'slider-' + sek.id;
    const sec = document.createElement('section');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-head">
        <div class="section-label">
          <div class="section-icon" style="color:var(--c-${sek.id})">${sectionIcons[sek.id] || sectionIcons.tech}</div>
          <span class="section-name">${sek.titel}</span>
        </div>
        <span class="section-count">${sek.artikel.length} Artikel</span>
      </div>
      <div class="slider-wrap">
        <button class="slider-btn prev" onclick="slide('${sliderId}',-1)">&#8592;</button>
        <div class="cards-slider" id="${sliderId}">${cards}</div>
        <button class="slider-btn next" onclick="slide('${sliderId}',1)">&#8594;</button>
      </div>
    `;
    container.appendChild(sec);
  });
})();

function slide(id, dir) {
  const el = document.getElementById(id);
  el.scrollBy({ left: dir * 320, behavior: 'smooth' });
}
</script>
</body>
